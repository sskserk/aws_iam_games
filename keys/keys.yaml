AWSTemplateFormatVersion: '2010-09-09'
Description: Create EC2 KeyPair from locally generated SSH keys, upload private key to Secrets Manager.

# Parameters:
#   KeyPairName:
#     Description: Name for the EC2 Key Pair
#     Type: String
#     Default: trantor_key
#   PublicKeyMaterial:
#     Description: Paste your SSH public key (id_rsa.pub) contents here
#     Type: String
#     Default: ssh-rsa  serk@serkpc
#   PrivateKeyMaterial:
#     Description: Paste your SSH private key (id_rsa) contents here
#     Type: String
#     NoEcho: true

Resources:
  ImportedKeyPair:
    Type: AWS::EC2::KeyPair
    Properties:
      KeyName: trantor_key
      PublicKeyMaterial: ssh-rsa  serk@serkpc
  
 
# Outputs:
#   KeyPairName:
#     Description: The name of the created EC2 Key Pair
#     Value: !Ref SSHKeyPair
